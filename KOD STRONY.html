<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sklep Serwera</title>

  <!-- PayPal SDK -->
  <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=PLN"></script>

  <style>
    body {
      font-family: Arial;
      margin:0;
      color:white;
      background: radial-gradient(circle at 20% 20%, #1e293b 0%, transparent 40%),
                  radial-gradient(circle at 80% 30%, #0ea5e9 0%, transparent 35%),
                  radial-gradient(circle at 50% 80%, #9333ea 0%, transparent 40%),
                  #020617;
      background-attachment: fixed;
    }

    .container { max-width:1200px; margin:auto; padding:20px; }

    h1 {
      text-align:center;
      font-size:40px;
      margin-bottom:30px;
      background: linear-gradient(90deg,#22c55e,#0ea5e9,#9333ea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(10px);
      padding:20px;
      border-radius:16px;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.05);
    }

    .card:hover {
      transform:translateY(-5px) scale(1.02);
      box-shadow:0 0 25px rgba(14,165,233,0.3);
    }

    .price { font-size:20px; margin:10px 0; }

    .paypal-btn { margin-top:10px; }

    input {
      width:100%;
      padding:10px;
      border-radius:8px;
      border:none;
      margin-top:10px;
      background:#0f172a;
      color:white;
    }

    button {
      background: linear-gradient(90deg,#22c55e,#0ea5e9);
      border:none;
      padding:10px;
      width:100%;
      border-radius:10px;
      cursor:pointer;
      color:white;
      font-weight:bold;
      transition:0.2s;
    }

    button:hover {
      opacity:0.9;
      transform:scale(1.03);
    }
  </style>
</head>
<body>
<div class="container">
  <h1>SKLEP SERWERA</h1>
  <button onclick="login()">Zaloguj przez Discord</button>
  <div id="user"></div>
  <div class="grid" id="products"></div>
</div>

<script>
const products = [
  {name:"UNBAN (1-2 dni)", price:14.99},
  {name:"UNBAN (3-7 dni)", price:29.99},
  {name:"UNBAN (8-14 dni)", price:59.99},
  {name:"UNBAN (15-30 dni)", price:99.99},
  {name:"UNBAN PERM", price:199.99},
  {name:"Coins 50", price:3.49},
  {name:"Coins 100", price:6.99},
  {name:"Coins 260", price:17.49},
  {name:"Coins 550", price:34.99},
  {name:"Coins 850", price:52.49},
  {name:"Coins 1150", price:69.99},
  {name:"Coins 1800", price:104.99},
  {name:"Coins 3000", price:174.99},
  {name:"Coins 6500", price:349.99},
  {name:"Coins 15000", price:699.99},
  {name:"Customowa rejestracja", price:13.99},
  {name:"Własny numer telefonu", price:20.99},
  {name:"Druga postać", price:27.99},
  {name:"Dźwięk pojazdu", price:34.99},
  {name:"Helikopter", price:160.99},
  {name:"Limitowany pojazd", price:199.99},
  {name:"Limitowany dom", price:244.99}
];

const container = document.getElementById("products");

products.forEach((p, index) => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>${p.name}</h3>
    <div class="price">${p.price} zł</div>
    <input placeholder="Twój Discord ID / Steam" id="player_${index}" />
    <div id="paypal-button-${index}" class="paypal-btn"></div>
  `;

  container.appendChild(div);

  paypal.Buttons({
    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{
          description: p.name,
          amount: { value: p.price.toFixed(2) }
        }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        const playerId = window.playerId || document.getElementById(`player_${index}`).value;

        fetch("/api/payment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            product: p.name,
            price: p.price,
            playerId: playerId,
            payer: details.payer.name.given_name
          })
        });

        alert("Płatność zakończona! Produkt zostanie dodany w grze.");
      });
    }
  }).render(`#paypal-button-${index}`);
});

function login() {
  window.location.href = "/auth/discord";
}

// sprawdza czy zalogowany
fetch("/api/user")
  .then(res => res.json())
  .then(user => {
    if (user) {
      document.getElementById("user").innerText =
        "Zalogowany jako: " + user.username;
      window.playerId = user.id; // przypisanie do zakupów
    }
  });
</script>

<!-- ANIMATED BACKGROUND PARTICLES -->
<canvas id="bg"></canvas>
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.style.position = "fixed";
canvas.style.top = 0;
canvas.style.left = 0;
canvas.style.zIndex = -1;
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, dx: (Math.random()-0.5)*0.5, dy: (Math.random()-0.5)*0.5 });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = "rgba(14,165,233,0.5)";
    ctx.fill();
    p.x += p.dx;
    p.y += p.dy;
    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
